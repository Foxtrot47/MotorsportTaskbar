name: Build Windows release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore MotorsportTaskbar.slnx

      - name: Run tests
        run: dotnet run --project MotorsportTaskbar.Tests -c Release --no-restore

      - name: Publish self-contained application
        shell: pwsh
        run: |
          dotnet publish MotorsportTaskbar/MotorsportTaskbar.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            --no-restore `
            -o artifacts/publish `
            -p:PublishSingleFile=true `
            -p:EnableCompressionInSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:PublishTrimmed=false `
            -p:PublishReadyToRun=false `
            -p:DebugSymbols=false `
            -p:DebugType=None

      - name: Create ZIP
        shell: pwsh
        run: Compress-Archive -Path artifacts/publish/* -DestinationPath artifacts/MotorsportTaskbar-win-x64.zip

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: MotorsportTaskbar-win-x64
          path: artifacts/MotorsportTaskbar-win-x64.zip
          if-no-files-found: error
          compression-level: 0
          retention-days: 30

      - name: Attach ZIP to tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $PSNativeCommandUseErrorActionPreference = $false
          $tag = "${{ github.ref_name }}"
          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag artifacts/MotorsportTaskbar-win-x64.zip --clobber
          } else {
            gh release create $tag artifacts/MotorsportTaskbar-win-x64.zip `
              --verify-tag `
              --generate-notes `
              --title $tag
          }
